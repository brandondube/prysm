version: 2.1

orbs:
  python: circleci/python@4.0.0

commands:
  install-miniforge:
    steps:
      - restore_cache:
          keys:
            - v1-miniforge-{{ arch }}-{{ checksum ".circleci/environment.yml" }}-{{ checksum "pyproject.toml" }}
            - v1-miniforge-{{ arch }}-
      - run:
          name: Install Miniforge
          command: |
            if [ ! -x "$HOME/miniforge3/bin/conda" ]; then
              curl -fsSL -o /tmp/miniforge.sh \
                https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh
              bash /tmp/miniforge.sh -b -p "$HOME/miniforge3"
            fi

            "$HOME/miniforge3/bin/conda" config --system --set channel_priority strict
            "$HOME/miniforge3/bin/conda" config --system --remove channels defaults || true
      - run:
          name: Create Miniforge environment
          command: |
            if "$HOME/miniforge3/bin/conda" env list | grep -qE '^prysm-ci[[:space:]]'; then
              "$HOME/miniforge3/bin/mamba" env update \
                --name prysm-ci \
                --file .circleci/environment.yml \
                --prune
            else
              "$HOME/miniforge3/bin/mamba" env create \
                --file .circleci/environment.yml
            fi

            "$HOME/miniforge3/bin/conda" clean --all --yes
      - save_cache:
          key: v1-miniforge-{{ arch }}-{{ checksum ".circleci/environment.yml" }}-{{ checksum "pyproject.toml" }}
          paths:
            - ~/miniforge3

jobs:
  build-and-test:
    resource_class: small
    executor:
      name: python/default
      tag: "3.14.5"
    steps:
      - checkout
      - install-miniforge
      - run:
          name: Install prysm
          command: |
            "$HOME/miniforge3/bin/conda" run --name prysm-ci \
              python -m pip install --no-build-isolation --no-deps --editable .
      - restore_cache:
          keys:
            - v1-riidb
      - run:
          name: Download refractiveindex.info database
          command: |
            if [ ! -f "$HOME/.refractiveindex.info-database/catalog-nk.yml" ]; then
              "$HOME/miniforge3/bin/conda" run --name prysm-ci \
                python -c "from prysm.x.materials.rii import default_db_path, _ensure_database_downloaded; _ensure_database_downloaded(default_db_path())"
            fi
      - save_cache:
          key: v1-riidb
          paths:
            - ~/.refractiveindex.info-database
      - run:
          name: Run tests
          command: |
            mkdir -p test-results/pytest
            "$HOME/miniforge3/bin/conda" run --name prysm-ci \
              python -m pytest --cov --junitxml=test-results/pytest/results.xml
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
      - run:
          name: Upload coverage to Coveralls
          command: |
            "$HOME/miniforge3/bin/conda" run --name prysm-ci coveralls

workflows:
  build-and-test:
    jobs:
      - build-and-test
